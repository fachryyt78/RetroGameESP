<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroGameESP — TruckaJumpa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0e12;
      --track: #2c3e50;
      --truck: #e67e22;
      --barrier: #c0392b;
      --white: #ecf0f1;
      --font: 'Press Start 2P', cursive;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      font-size: 10px;
      background-image: radial-gradient(ellipse 80% 40% at 50% 0%, #1a252f 0%, var(--bg) 70%);
    }

    h1 {
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--truck);
      text-shadow: 2px 2px 0 #1a1a1a;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 8px;
      color: #7f8c8d;
      margin-bottom: 14px;
    }

    .game-wrap {
      border: 4px solid var(--white);
      padding: 8px;
      background: var(--track);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: inset 0 0 0 2px #1a1a1a, 0 8px 28px rgba(0,0,0,0.5);
    }

    #game {
      display: block;
      background: var(--track);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 672px;
      margin-top: 12px;
      font-size: 8px;
    }

    .hud span { margin-right: 16px; }

    .controls {
      margin-top: 14px;
      font-size: 8px;
      color: #95a5a6;
      text-align: center;
      line-height: 2;
    }

    .controls kbd {
      background: #34495e;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font);
      margin: 0 2px;
    }

    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(12, 14, 18, 0.96);
      font-size: 10px;
      text-align: center;
      padding: 24px;
    }

    .screen.hidden { display: none; }

    .screen h2 { margin-bottom: 12px; font-size: 12px; color: var(--truck); }
    .screen p { margin-bottom: 8px; color: #95a5a6; line-height: 1.8; }
    .screen .score-line { font-size: 14px; color: var(--white); margin: 12px 0; }

    button {
      font-family: var(--font);
      font-size: 10px;
      padding: 12px 24px;
      margin-top: 12px;
      background: var(--truck);
      color: var(--bg);
      border: none;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.15); }
    button:active { transform: scale(0.98); }

    .canvas-wrap { position: relative; width: fit-content; height: fit-content; }

    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    }

    .high-scores {
      max-width: 672px;
      width: 100%;
